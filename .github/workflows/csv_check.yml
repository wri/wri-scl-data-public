# =============================================================================
# CSV Quality Check — runs on every PR that touches CSV files.
# Checks out scl-data-ops for audit scripts, runs csv_auditor.py,
# and posts results as a PR comment. Blocks merge if errors found.
#
# Only reports issues for files CHANGED in the PR — pre-existing
# issues in other files are ignored.
#
# SECRETS REQUIRED:
#   DATA_REPO_TOKEN — PAT with read access to data repos + scl-data-ops
# =============================================================================

name: CSV Quality Check

on:
  pull_request:
    paths: ['**/*.csv']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      # ── Checkout repos ─────────────────────────────────────────────────────
      - name: Check out this repo (PR branch)
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Check out scl-data-ops (audit scripts + config)
        uses: actions/checkout@v4.2.2
        with:
          repository: wri/scl-data-ops
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _ops

      - name: Check out sibling data repo
        uses: actions/checkout@v4.2.2
        with:
          repository: wri/wri-scl-data
          token: ${{ secrets.DATA_REPO_TOKEN }}
          path: _other

      # ── Setup ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      # ── Get changed files ──────────────────────────────────────────────────
      - name: Get changed CSV files
        id: changed
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- '*.csv' | xargs -I{} basename {} | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "files=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed CSVs: $CHANGED"

      # ── Run audit ──────────────────────────────────────────────────────────
      - name: Run CSV audit
        id: audit
        run: |
          python3 _ops/scripts/csv_auditor.py \
            . \
            --config _ops/config/audit_rules.yaml \
            --config-dir _ops/config \
            --repo-name wri-scl-data-public \
            --metadata _ops/config/metadata \
            --other-repo _other \
            --json-output /tmp/audit.json \
          || true

          # Parse JSON and format PR comment — only for changed files
          python3 - <<'PYEOF'
          import json, os

          changed_str = os.environ.get('CHANGED_FILES', '')
          changed_files = set(f.strip() for f in changed_str.split(',') if f.strip())

          with open('/tmp/audit.json') as f:
              data = json.load(f)

          # Filter to only changed files
          error_rows = []
          warn_rows = []
          for fname, fdata in sorted(data['files'].items()):
              if fname not in changed_files:
                  continue
              for issue in fdata['issues']:
                  row = f'| {fname} | {issue["category"]} | {issue["detail"]} |'
                  if issue['severity'] == 'error':
                      error_rows.append(row)
                  elif issue['severity'] == 'warning':
                      warn_rows.append(row)

          # Cross-file / folder issues — only if they involve changed files
          for ci in data.get('cross_file_issues', []):
              if ci.get('file', '') not in changed_files:
                  continue
              sev = ci.get('severity', 'warning')
              row = f'| {ci["file"]} | Cross-file | {ci["detail"]} |'
              if sev == 'error':
                  error_rows.append(row)
              else:
                  warn_rows.append(row)

          for fi in data.get('folder_issues', []):
              involved = [f for f in fi.get('files', []) if f in changed_files]
              if not involved:
                  continue
              files_str = ', '.join(involved[:5])
              if len(involved) > 5:
                  files_str += f' (+{len(involved) - 5} more)'
              row = f'| {files_str} | {fi["category"]} | {fi["detail"]} |'
              error_rows.append(row)

          errors = len(error_rows)
          warns = len(warn_rows)
          n_changed = len(changed_files)

          lines = ['<!-- csv-audit -->', '## CSV Audit Results', '']

          if errors == 0 and warns == 0:
              lines.append(f'All checks passed. {n_changed} changed file{"s" if n_changed != 1 else ""} checked, no issues found.')
          else:
              parts = []
              if errors:
                  parts.append(f'**{errors} error{"s" if errors != 1 else ""}**')
              if warns:
                  parts.append(f'{warns} warning{"s" if warns != 1 else ""}')
              parts.append(f'{n_changed} changed file{"s" if n_changed != 1 else ""} checked')
              lines.append(' | '.join(parts))
              lines.append('')

              if error_rows:
                  lines.append('### Errors')
                  lines.append('| File | Issue | Detail |')
                  lines.append('|------|-------|--------|')
                  lines.extend(error_rows)
                  lines.append('')

              if warn_rows:
                  lines.append('### Warnings')
                  lines.append('| File | Issue | Detail |')
                  lines.append('|------|-------|--------|')
                  lines.extend(warn_rows)
                  lines.append('')

          comment_body = '\n'.join(lines)

          # Write outputs
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write('comment<<ENDOFCOMMENT\n')
              out.write(comment_body + '\n')
              out.write('ENDOFCOMMENT\n')
              out.write(f'has_errors={"true" if errors > 0 else "false"}\n')

          PYEOF
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}

      # ── Post/update PR comment ─────────────────────────────────────────────
      - name: Post audit comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DATA_REPO_TOKEN }}
          script: |
            const marker = '<!-- csv-audit -->';
            const body = `${{ steps.audit.outputs.comment }}`;
            const prNumber = context.payload.pull_request.number;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

      # ── Fail if errors ─────────────────────────────────────────────────────
      - name: Fail if audit errors found
        if: steps.audit.outputs.has_errors == 'true'
        run: |
          echo "::error::CSV audit found errors — see PR comment for details."
          exit 1
